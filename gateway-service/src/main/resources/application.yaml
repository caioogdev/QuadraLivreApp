spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: kafka-service
              uri: lb://kafka-service
              predicates:
                - Path=/courts/search,/courts/search/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: kafka-service
                    fallbackUri: forward:/fallback/search
            - id: catalogo-service
              uri: lb://courts-service
              predicates:
                - Path=/courts,/courts/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: catalogo-service
                    fallbackUri: forward:/fallback/courts
            - id: reservas-service
              uri: lb://agendamentos-service
              predicates:
                - Path= /reservas, /reservas/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: reservas-service
                    fallbackUri: forward:/fallback/reservas

resilience4j:
  circuitbreaker:
    instances:
      catalogo-service:
        slidingWindowSize: 10
        failureRateThreshold: 20
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
      reservas-service:
        slidingWindowSize: 10
        failureRateThreshold: 20
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED
      kafka-service:
        slidingWindowSize: 10
        failureRateThreshold: 20
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        slidingWindowType: COUNT_BASED

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: gateway-service-java

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    registry-fetch-interval-seconds: 5
  instance:
    hostname: host.docker.internal
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15